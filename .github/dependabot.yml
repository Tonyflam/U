version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    groups:
      types:
        patterns: ['@types/*']
      eslint:
        patterns: ['eslint*', 'typescript-eslint', '@eslint/*']
      vitest:
        patterns: ['vitest', '@vitest/*']
      prod-minor:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']
